      value: ["GLM-5"]
    priority: 1

  - name: "Mobius"
    base_url: "http://192.168.10.121:2525/v1"
    model_match:
      type: "exact"
      value: ["Mobius-r6-12B-chat", "xiaoke", "xiaoke-chat"]
    priority: 4 
    # stop: ["\n\nUser:", "\n\nAssistant:", "\n\nObservation:", "[PAD65531]"]

  - name: "Mobius-cot"
    base_url: "http://192.168.10.121:2525/v1"
