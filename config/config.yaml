openai_clients:
  - name: "deepseek_cloud"
    # api_key: "sk-11f4a74a7ca34dd3a88721935947bc57"
    api_key: "sk-cfcc988838f84e4482e77fa92eb8a597"
    base_url: "https://api.deepseek.com"
    model_match:
      type: "keyword"
      value: ["deepseek"]
    priority: 2
    max_tokens: 8192

  - name: "qwenvl"
    base_url: "http://192.168.9.120:1025/v1"
    model_match:
      type: "keyword"
      value: ["Qwen3-VL-235B-A22B-Instruct"]
    priority: 1
    fallback: "Qwen3.5-397B-A17B"

  - name: "qwen35"
    base_url: "http://192.168.9.120:1025/v1"
    model_match:
      type: "keyword"
      value: ["Qwen3.5-397B-A17B"]
    priority: 1

  - name: "minimax_loacal"
    base_url: "http://192.168.10.25:8000/v1"
    api_key: "xk-0pRR5I8xQqEW3Y4TEtyNynLBvFpwBEVo"
    model_match:
      type: "keyword"
      value: ["MiniMax-M2.1"]
    priority: 1

  - name: "minimax2_loacal"
    base_url: "http://192.168.10.23:1025/v1"
